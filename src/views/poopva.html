}

  let avgNote = "Log a few to see your trend.";
  if (total) {

  const days = new Set(myLogs.map(l => dayKey(l.timestamp)));

  const poodosOf = l => (l.poodos || []).length;

    { e: "🚽", t: "First Timer", d: "Log your first movement", got: total >= 1 },

    { e: "🔥", t: "On a Roll", d: "3-day logging streak", got: streak >= 3 },
    { e: "🥇", t: "Gold Standard", d: "Log a perfect Type 4", got: myLogs.some(l => l.bristolType === 4) },
    { e: "⭐", t: "Crowd Pleaser", d: "Earn 5 Poodos on one log", got: myLogs.some(l => poodosOf(l) >= 5) },
    { e: "⚡", t: "Quick Draw", d: "Finish in under 2 minutes", got: myLogs.some(l => l.duration === "< 2 min") },
    { e: "🧘", t: "Took Your Time", d: "A 15-minute-plus session", got: myLogs.some(l => l.duration === "15 min +") },
    { e: "🌍", t: "Globetrotter", d: "Log in 3 different spots", got: spots.size >= 3 },
    { e: "📸", t: "Shutterbug", d: "Attach a photo", got: myLogs.some(l => l.photoBase64) },
  ];
  const av = avatarFor(username);

  return e("div", { className: "space-y-5" },
    e("div", { className: "flex items-center gap-4" },
      e("div", { className: "flex h-16 w-16 items-center justify-center rounded-full text-3xl", style: { background: av.color, color: "#fff" } }, av.emoji),
      e("div", null,
        e("div", { className: "text-xl font-extrabold text-stone-900" }, username),
        e("div", { className: "text-sm font-semibold", style: { color: ACCENT } }, rankTitle(total)))),
    e("div", { className: "grid grid-cols-2 gap-3" },
      e(StatTile, { icon: e(TrendingUp, { size: 14 }), label: "Logs", value: total }),
      e(StatTile, { icon: e("span", { className: "text-xs" }, "💩"), label: "Poodos", value: totalPoodos, accent: ACCENT }),
      e(StatTile, { icon: e(Flame, { size: 14 }), label: "Day streak", value: streak }),
      e(StatTile, { icon: e(Calendar, { size: 14 }), label: "This week", value: weekCount })),
    e("div", { className: "rounded-3xl bg-white border border-stone-200 p-4" },
      e("div", { className: "flex items-baseline justify-between" },
        e("h3", { className: "font-bold text-stone-800" }, "Bristol breakdown"),
        e("span", { className: "text-sm text-stone-500" }, "avg ", e("b", { style: { color: BRAND_DARK } }, avgTxt))),
      e("p", { className: "mt-0.5 text-xs text-stone-400" }, avgNote),
      e("div", { className: "mt-3 space-y-2" }, dist.map(d => e("div", { key: d.type, className: "flex items-center gap-2" },
        e("div", { className: "flex h-6 w-6 items-center justify-center rounded-md text-xs font-bold text-white", style: { background: d.bar } }, d.type),
        e("div", { className: "h-3 flex-1 overflow-hidden rounded-full bg-stone-100" }, e("div", { className: "h-full rounded-full", style: { width: d.count / maxC * 100 + "%", background: d.bar, minWidth: d.count ? 8 : 0 } })),
        e("span", { className: "w-5 text-right text-xs font-semibold text-stone-500" }, d.count))))),
    e("div", null,
      e("div", { className: "mb-2 flex items-center gap-2" }, e(Award, { size: 18, style: { color: BRAND } }), e("h3", { className: "font-bold text-stone-800" }, "Achievements")),
      e("div", { className: "grid grid-cols-2 gap-3" }, ach.map(a => e("div", { key: a.t, className: "rounded-2xl border p-3", style: a.got ? { background: TINT, borderColor: "#e7d8c7" } : { background: "#fafaf9", borderColor: "#f0efed" } },
        e("div", { className: "flex items-center justify-between" },
          e("span", { className: "text-2xl", style: { filter: a.got ? "none" : "grayscale(1) opacity(0.5)" } }, a.e),
          !a.got && e(Lock, { size: 14, className: "text-stone-300" })),
        e("div", { className: "mt-1 text-sm font-bold", style: { color: a.got ? BRAND_DARK : "#a8a29e" } }, a.t),
        e("div", { className: "text-[11px] leading-tight text-stone-400" }, a.d))))));

/* ------------------------------------------------------------------ *
 * Root app — all data lives on the server via /api/poopva.
 * ------------------------------------------------------------------ */
function App() {
  const [identity, setIdentity] = useState(readIdentity);
  const [tab, setTab] = useState("feed");
  const [sheet, setSheet] = useState(false);
  const [saving, setSaving] = useState(false);
  const [feed, setFeed] = useState([]);
  const [loading, setLoading] = useState(true);
  const [stats, setStats] = useState(null);
  const [toast, setToast] = useState("");

  const { userId, username } = identity;

  function flash(msg) { setToast(msg); setTimeout(() => setToast(""), 1800); }

  async function fetchFeed() {
    try {
      const res = await fetch(API + "/logs");
      const data = await res.json();
      setFeed(Array.isArray(data) ? data : []);
    } catch (err) {
      console.error("Poopva: failed to load feed", err);
    } finally {
      setLoading(false);
    }
  }

  async function fetchStats() {
    try {
      const res = await fetch(API + "/users/" + encodeURIComponent(userId) + "/stats");
      const data = await res.json();
      setStats(data);
    } catch (err) {
      console.error("Poopva: failed to load stats", err);
    }
  }

  // Initial load + 30s auto-refresh of the shared feed.
  useEffect(() => {
    if (!username) return;
    fetchFeed();
    const id = setInterval(fetchFeed, 30000);
    return () => clearInterval(id);
  }, [username]);

  // (Re)fetch personal stats whenever the You tab is shown or the feed changes.
  useEffect(() => {
    if (tab === "you" && username) fetchStats();
  }, [tab, feed, username]);

  async function addLog(payload) {
    setSaving(true);
    try {
      await fetch(API + "/logs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ logId: crypto.randomUUID(), userId, username, ...payload }),
      });
      setSheet(false);
      setTab("feed");
      flash("Logged! 💩");
      await fetchFeed();
    } catch (err) {
      console.error("Poopva: failed to save log", err);
      flash("Couldn’t save — try again");
    } finally {
      setSaving(false);
    }
  }

  async function deleteLog(logId) {
    setFeed(prev => prev.filter(l => l.logId !== logId)); // optimistic
    try {
      await fetch(API + "/logs/" + logId, {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId }),
      });
      flash("Removed");
    } catch (err) {
      console.error("Poopva: failed to delete", err);
    }
    fetchFeed();
  }

  function togglePoodos(logId) {
    setFeed(prev => prev.map(l => {
      if (l.logId !== logId) return l;
      const has = (l.poodos || []).includes(userId);
      return { ...l, poodos: has ? l.poodos.filter(u => u !== userId) : [...(l.poodos || []), userId] };
    }));
    fetch(API + "/logs/" + logId + "/poodo", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId }),
    }).catch(err => { console.error("Poopva: failed to poodo", err); fetchFeed(); });
  }

  async function addComment(logId, text) {
    const t = text.trim();
    if (!t) return;
    setFeed(prev => prev.map(l => l.logId === logId
      ? { ...l, comments: [...(l.comments || []), { userId, username, text: t, createdAt: new Date().toISOString() }] }
      : l));
    try {
      await fetch(API + "/logs/" + logId + "/comments", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, username, text: t }),
      });
    } catch (err) {
      console.error("Poopva: failed to comment", err);
    }
    fetchFeed();
  }

  function chooseName(name) {
    localStorage.setItem(LS_NAME, name);
    setIdentity({ userId, username: name });
  }

  // First launch — collect a username before showing the app.
  if (!username) return e(NameModal, { onSubmit: chooseName });

  const myLogs = feed.filter(l => l.userId === userId);

  return e("div", { className: "min-h-screen w-full", style: { background: CREAM, fontFamily: "ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" } },
    e("div", { className: "mx-auto flex min-h-screen max-w-md flex-col" },
      e("header", { className: "sticky top-0 z-30 border-b border-stone-200 bg-white/90 px-4 py-3 backdrop-blur" },
        e("div", { className: "flex items-center gap-2" },
          e("span", { className: "text-2xl" }, "💩"),
          e("span", { className: "text-xl font-extrabold tracking-tight", style: { color: BRAND_DARK } }, "Poopva"),
          e("span", { className: "ml-1 mt-0.5 text-xs font-medium text-stone-400" }, "Share every movement"),
          e("div", { className: "flex-1" }),
          e("span", { className: "text-xs font-semibold text-stone-500" }, "Hi, ", username))),
      e("main", { className: "flex-1 px-4 pb-28 pt-4" },
        tab === "feed" && (loading
          ? e(Spinner, { note: "Loading the feed…" })
          : e("div", { className: "space-y-4" },
              feed.length === 0 && e("div", { className: "rounded-3xl border border-dashed border-stone-300 bg-white p-5 text-center" },
                e("div", { className: "text-3xl" }, "🚽"),
                e("div", { className: "mt-1 font-bold text-stone-800" }, "No logs yet"),
                e("p", { className: "mt-0.5 text-sm text-stone-500" }, "Tap the ＋ to record the very first movement. The feed is all yours — for now.")),
              feed.map(l => e(Card, {
                key: l.logId,
                log: l,
                mine: l.userId === userId,
                given: (l.poodos || []).includes(userId),
                onPoodos: togglePoodos,
                onComment: addComment,
                onDelete: deleteLog,
              })))),
        tab === "bristol" && e(BristolView, null),
        tab === "you" && e(StatsView, { stats, myLogs, username })),
      e("nav", { className: "fixed inset-x-0 bottom-0 z-30 mx-auto max-w-md border-t border-stone-200 bg-white" },
        e("div", { className: "grid grid-cols-4 items-end px-2 pb-2 pt-1.5" },
          e(NavBtn, { active: tab === "feed", onClick: () => setTab("feed"), icon: e(Home, { size: 22 }), label: "Feed" }),
          e(NavBtn, { active: tab === "bristol", onClick: () => setTab("bristol"), icon: e(BookOpen, { size: 22 }), label: "Bristol" }),
          e("div", { className: "flex justify-center" },
            e("button", { onClick: () => setSheet(true), className: "-mt-6 flex h-14 w-14 items-center justify-center rounded-full text-white shadow-lg active:scale-95", style: { background: BRAND }, "aria-label": "Log a poop" }, e(Plus, { size: 28 }))),
          e(NavBtn, { active: tab === "you", onClick: () => setTab("you"), icon: e(User, { size: 22 }), label: "You" }))),
      toast && e("div", { className: "fixed bottom-24 left-1/2 z-50 -translate-x-1/2 rounded-full px-4 py-2 text-sm font-semibold text-white shadow-lg", style: { background: BRAND_DARK } }, toast),
      sheet && e(LogSheet, { onSave: addLog, onClose: () => setSheet(false), saving })));
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App, null));
  </script>
